<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us - A Coder</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- Global Header -->
<div id="header"></div>


<main style="padding:8rem 2rem 4rem;">

<div class="container" style="max-width:800px;">

<h1 style="font-size:3rem;text-align:center;margin-bottom:1rem;">
Contact <span class="gradient-text">A Coder</span>
</h1>

<p style="text-align:center;color:var(--text-secondary);margin-bottom:3rem;">
Have a question, suggestion, or partnership idea? We'd love to hear from you.
</p>


<!-- Contact Form -->

<form style="
background:var(--bg-secondary);
padding:2.5rem;
border-radius:16px;
border:1px solid var(--border-color);
">

<div style="margin-bottom:1.5rem;">

<label>Name</label>

<input type="text" placeholder="Your name"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border-color);
margin-top:6px;
">

</div>


<div style="margin-bottom:1.5rem;">

<label>Email</label>

<input type="email" placeholder="your@email.com"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border-color);
margin-top:6px;
">

</div>


<div style="margin-bottom:1.5rem;">

<label>Subject</label>

<input type="text" placeholder="Message subject"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border-color);
margin-top:6px;
">

</div>


<div style="margin-bottom:2rem;">

<label>Message</label>

<textarea placeholder="Write your message..."
rows="5"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border-color);
margin-top:6px;
"></textarea>

</div>


<button style="
width:100%;
padding:14px;
background:var(--gradient-primary);
border:none;
border-radius:10px;
font-weight:600;
color:white;
font-size:16px;
cursor:pointer;
">

Send Message

</button>

</form>



<!-- Contact Info -->

<section style="margin-top:4rem;text-align:center;">

<h2 style="font-size:1.8rem;margin-bottom:1rem;">
Other Ways to Reach Us
</h2>

<p style="color:var(--text-secondary);margin-bottom:1rem;">
Email us directly
</p>

<a href="mailto:acoder908@gmail.com"
style="
color:var(--primary);
font-weight:600;
">

contact-acoder.com

</a>

</section>



</div>

</main>



<!-- Global Footer -->
<div id="footer"></div>


<!-- Global Loader -->
<script src="../js/glo.js"></script>


</body>
</html>
